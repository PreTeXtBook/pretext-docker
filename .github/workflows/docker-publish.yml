name: docker-publish

on:
  #schedule:
    # * is a special character in YAML so you have to quote this string
    #- cron: "0 0 * * 0"

  repository_dispatch:
    types: [pretext-publish]

  workflow_dispatch:
    inputs:
      container:
        description: "Which docker image(s) to rebuild"
        required: true
        type: choice
        default: "all"
        options:
          - "all"
          - "base"
          - "full"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      # Job-level `if:` conditions can't see the `matrix` context, so instead
      # of filtering matrix legs by the "container" input after the fact, we
      # compute the already-filtered matrix here and hand it to `build`/`merge`
      # via fromJSON(). See https://docs.github.com/en/actions/learn-github-actions/contexts#context-availability
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      merge_images: ${{ steps.matrix.outputs.merge_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read version from version.txt
        id: version
        run: |
            VERSION=$(cat version.txt | tr -d '\n')
            echo "Container version to deploy: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Compute build/merge matrices from the "container" input
        id: matrix
        env:
          CONTAINER_INPUT: ${{ github.event.inputs.container }}
        run: |
            CONTAINER="${CONTAINER_INPUT:-all}"
            BUILD_MATRIX=$(jq -n --arg container "$CONTAINER" '
              [
                {image:"base", file:"./base/Dockerfile", platform:"linux/amd64", runner:"ubuntu-latest"},
                {image:"base", file:"./base/Dockerfile", platform:"linux/arm64", runner:"ubuntu-24.04-arm"},
                {image:"full", file:"./full/Dockerfile", platform:"linux/amd64", runner:"ubuntu-latest"},
                {image:"full", file:"./full/Dockerfile", platform:"linux/arm64", runner:"ubuntu-24.04-arm"}
              ] | map(select($container == "all" or .image == $container))
            ')
            MERGE_IMAGES=$(jq -n --arg container "$CONTAINER" '
              ["base", "full"] | map(select($container == "all" or . == $container))
            ')
            echo "Build matrix: $BUILD_MATRIX"
            echo "Merge images: $MERGE_IMAGES"
            echo "build_matrix=$(jq -c . <<< "$BUILD_MATRIX")" >> "$GITHUB_OUTPUT"
            echo "merge_images=$(jq -c . <<< "$MERGE_IMAGES")" >> "$GITHUB_OUTPUT"

  # Each matrix leg builds a single architecture, natively, on a runner of
  # that architecture -- no QEMU emulation involved. It pushes an untagged,
  # digest-only image (push-by-digest); the merge job below stitches the
  # per-arch digests together into the real multi-arch tags. This is
  # Docker's documented pattern for multi-platform builds across native
  # runners: https://docs.docker.com/build/ci/github-actions/multi-platform/
  build:
    needs: version
    environment: ${{ github.event_name == 'repository_dispatch' && 'DelayedDeploy' || null }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.version.outputs.build_matrix) }}
    runs-on: ${{ matrix.runner }}
    env:
      REPO: ${{ matrix.image == 'base' && format('{0}/pretext', secrets.DOCKERHUB_USERNAME) || format('{0}/pretext-full', secrets.DOCKERHUB_USERNAME) }}
    steps:
      - name: check disk space
        run: df . -h
      - name: Free disk space (only needed for 'full' image)
        if: ${{ matrix.image == 'full' }}
        run: |
          sudo docker rmi $(docker image ls -aq) >/dev/null 2>&1 || true
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/lib/jvm || true
          echo "some directories deleted"
          sudo apt-get update >/dev/null 2>&1 || true
          sudo apt-get purge aria2 ansible azure-cli shellcheck rpm xorriso zsync \
            esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable \
            google-cloud-sdk imagemagick \
            libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional kubectl \
            mercurial apt-transport-https mono-complete libmysqlclient \
            unixodbc-dev yarn chrpath libssl-dev libxft-dev \
            libfreetype6 libfreetype6-dev libfontconfig1 libfontconfig1-dev \
            snmp pollinate libpq-dev postgresql-client powershell ruby-full \
            sphinxsearch subversion mongodb-org azure-cli microsoft-edge-stable \
            -y >/dev/null 2>&1 || true
          sudo apt-get purge google-cloud-sdk -y >/dev/null 2>&1 || true
          sudo apt-get purge microsoft-edge-stable -y >/dev/null 2>&1 || true
          sudo apt-get purge mysql-server -y >/dev/null 2>&1 || true
          sudo apt-get purge php -y >/dev/null 2>&1 || true
          sudo apt-get purge dotnet-sdk-* -y >/dev/null 2>&1 || true
          sudo apt-get autoremove -y >/dev/null 2>&1
          sudo apt-get autoclean -y >/dev/null 2>&1
          echo "some packages purged"
      - name: check disk space final
        run: df . -h
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare platform pair for artifact naming
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          build-args: ${{ matrix.image == 'full' && format('BASE_IMAGE_TAG={0}', needs.version.outputs.version) || '' }}
          outputs: type=image,name=${{ env.REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combines each image's per-arch digests (uploaded above) into the real,
  # multi-arch `:VERSION` and `:latest` tags.
  merge:
    needs: [version, build]
    environment: ${{ github.event_name == 'repository_dispatch' && 'DelayedDeploy' || null }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.version.outputs.merge_images) }}
    runs-on: ubuntu-latest
    env:
      REPO: ${{ matrix.image == 'base' && format('{0}/pretext', secrets.DOCKERHUB_USERNAME) || format('{0}/pretext-full', secrets.DOCKERHUB_USERNAME) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REPO }}:${{ needs.version.outputs.version }} \
            --tag ${{ env.REPO }}:latest \
            $(printf '${{ env.REPO }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REPO }}:${{ needs.version.outputs.version }}
