name: docker-publish

on:
  #schedule:
    # * is a special character in YAML so you have to quote this string
    #- cron: "0 0 * * 0"

  repository_dispatch:
    types: [pretext-publish]

  workflow_dispatch:
    inputs:
      container:
        description: "Which docker image(s) to rebuild"
        required: true
        type: choice
        default: "all"
        options:
          - "all"
          - "base"
          - "full"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Read version from version.txt
        id: version
        run: |
            VERSION=$(cat version.txt | tr -d '\n')
            echo "Container version to deploy: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # Each matrix leg below builds a single architecture, natively, on a runner
  # of that architecture -- no QEMU emulation involved. It pushes an untagged,
  # digest-only image (push-by-digest); the following merge job stitches the
  # per-arch digests together into the real multi-arch tags. This is Docker's
  # documented pattern for multi-platform builds across native runners:
  # https://docs.docker.com/build/ci/github-actions/multi-platform/
  build_base:
    needs: version
    if: ${{ needs.version.result == 'success' && (github.event.inputs.container == 'all' || github.event.inputs.container == 'base' || github.event.inputs.container == '') }}
    environment: ${{ github.event_name == 'repository_dispatch' && 'DelayedDeploy' || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      REPO: ${{ format('{0}/pretext', secrets.DOCKERHUB_USERNAME) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare platform pair for artifact naming
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./base/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-base-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combines base's per-arch digests into the real, multi-arch `:VERSION` and
  # `:latest` tags. `build_full` below depends on this actually completing
  # (not just being skipped) whenever base is being rebuilt in the same run,
  # since `full` builds FROM this same version's published base image.
  merge_base:
    needs: [version, build_base]
    if: ${{ needs.build_base.result == 'success' && (github.event.inputs.container == 'all' || github.event.inputs.container == 'base' || github.event.inputs.container == '') }}
    environment: ${{ github.event_name == 'repository_dispatch' && 'DelayedDeploy' || null }}
    runs-on: ubuntu-latest
    env:
      REPO: ${{ format('{0}/pretext', secrets.DOCKERHUB_USERNAME) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-base-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REPO }}:${{ needs.version.outputs.version }} \
            --tag ${{ env.REPO }}:latest \
            $(printf '${{ env.REPO }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REPO }}:${{ needs.version.outputs.version }}

  build_full:
    # `full` builds FROM pretextbook/pretext:<this same VERSION>, so it can't
    # start until that base tag actually exists on Docker Hub. If base is
    # also being rebuilt this run, that means waiting for merge_base to
    # finish publishing it -- merge_base being merely *skipped* (because only
    # "full" was selected, so base:VERSION is assumed already published from
    # an earlier run) is fine and shouldn't block this job, but merge_base
    # actually *failing* should. The always() + explicit result checks are
    # needed because a custom `if:` replaces GitHub's default success/skip
    # gating rather than adding to it, and a skipped dependency is normally
    # enough to auto-skip a dependent job too.
    needs: [version, merge_base]
    if: |
      always() &&
      needs.version.result == 'success' &&
      (needs.merge_base.result == 'success' || needs.merge_base.result == 'skipped') &&
      (github.event.inputs.container == 'all' || github.event.inputs.container == 'full' || github.event.inputs.container == '')
    environment: ${{ github.event_name == 'repository_dispatch' && 'DelayedDeploy' || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      REPO: ${{ format('{0}/pretext-full', secrets.DOCKERHUB_USERNAME) }}
    steps:
      - name: check disk space
        run: df . -h
      - name: Free disk space
        run: |
          sudo docker rmi $(docker image ls -aq) >/dev/null 2>&1 || true
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/lib/jvm || true
          echo "some directories deleted"
          sudo apt-get update >/dev/null 2>&1 || true
          sudo apt-get purge aria2 ansible azure-cli shellcheck rpm xorriso zsync \
            esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable \
            google-cloud-sdk imagemagick \
            libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional kubectl \
            mercurial apt-transport-https mono-complete libmysqlclient \
            unixodbc-dev yarn chrpath libssl-dev libxft-dev \
            libfreetype6 libfreetype6-dev libfontconfig1 libfontconfig1-dev \
            snmp pollinate libpq-dev postgresql-client powershell ruby-full \
            sphinxsearch subversion mongodb-org azure-cli microsoft-edge-stable \
            -y >/dev/null 2>&1 || true
          sudo apt-get purge google-cloud-sdk -y >/dev/null 2>&1 || true
          sudo apt-get purge microsoft-edge-stable -y >/dev/null 2>&1 || true
          sudo apt-get purge mysql-server -y >/dev/null 2>&1 || true
          sudo apt-get purge php -y >/dev/null 2>&1 || true
          sudo apt-get purge dotnet-sdk-* -y >/dev/null 2>&1 || true
          sudo apt-get autoremove -y >/dev/null 2>&1
          sudo apt-get autoclean -y >/dev/null 2>&1
          echo "some packages purged"
      - name: check disk space final
        run: df . -h
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare platform pair for artifact naming
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./full/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: BASE_IMAGE_TAG=${{ needs.version.outputs.version }}
          outputs: type=image,name=${{ env.REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-full-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge_full:
    needs: [version, build_full]
    if: ${{ needs.build_full.result == 'success' && (github.event.inputs.container == 'all' || github.event.inputs.container == 'full' || github.event.inputs.container == '') }}
    environment: ${{ github.event_name == 'repository_dispatch' && 'DelayedDeploy' || null }}
    runs-on: ubuntu-latest
    env:
      REPO: ${{ format('{0}/pretext-full', secrets.DOCKERHUB_USERNAME) }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-full-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REPO }}:${{ needs.version.outputs.version }} \
            --tag ${{ env.REPO }}:latest \
            $(printf '${{ env.REPO }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.REPO }}:${{ needs.version.outputs.version }}
